<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Ultra-luxurious Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a7a35" />
      <stop offset="20%" stop-color="#caa75a" />
      <stop offset="40%" stop-color="#fdf0cd" />
      <stop offset="60%" stop-color="#d4af37" />
      <stop offset="80%" stop-color="#f3e5ab" />
      <stop offset="100%" stop-color="#ab8532" />
    </linearGradient>

    <!-- Darker Shadow Gold for 3D faceting -->
    <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70531c" />
      <stop offset="50%" stop-color="#9d762a" />
      <stop offset="100%" stop-color="#4d370f" />
    </linearGradient>
    
    <!-- Smooth drop shadow for tabs readability -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- Luxurious deep dark backing circle with a gold rim -->
  <circle cx="32" cy="32" r="29" fill="#0b0c10" stroke="url(#gold-grad)" stroke-width="1.5" />

  <!-- The Golden 'M' Structural Mark -->
  <g filter="url(#glow)">
    <!-- Left Vertical Leg -->
    <path d="M15 47 L15 19 L22 19 L22 47 Z" fill="url(#gold-grad)" />
    
    <!-- Right Vertical Leg -->
    <path d="M42 47 L42 19 L49 19 L49 47 Z" fill="url(#gold-grad)" />
    
    <!-- Left Chevron (Faceted 3D Truss) -->
    <path d="M22 19 L32 38 L32 46 L22 28 Z" fill="url(#gold-dark)" />
    
    <!-- Right Chevron (Faceted 3D Truss) -->
    <path d="M42 19 L32 38 L32 46 L42 28 Z" fill="url(#gold-grad)" />
    
    <!-- Mechanical structural overlay pins (creates high-end engineering detail) -->
    <circle cx="18.5" cy="22.5" r="1.5" fill="#fdf0cd" opacity="0.9" />
    <circle cx="18.5" cy="43.5" r="1.5" fill="#fdf0cd" opacity="0.9" />
    <circle cx="45.5" cy="22.5" r="1.5" fill="#fdf0cd" opacity="0.9" />
    <circle cx="45.5" cy="43.5" r="1.5" fill="#fdf0cd" opacity="0.9" />
    <circle cx="32" cy="41.5" r="1.5" fill="#fdf0cd" opacity="0.9" />
  </g>
</svg>
